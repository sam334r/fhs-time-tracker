// ---------- TRANSLATIONS ----------
const T = {

    confirmClockOut: "¿Salir ahora?",
    requestNote: "Razón (opcional)",
    actualClockOut: "Hora real de salida",
    submitFix: "Enviar solicitud",
    cancel: "Cancelar",
    pendingFixRequest: "Solicitud de corrección pendiente",
    addMissedPunch: "Agregar entrada perdida",
    missedPunchDesc: "¿Olvidó marcar? Envíe una entrada perdida de los últimos 7 días.",

    clockOutTime: "Hora de salida",
    submit: "Enviar al gerente",
    missedSent: "Entrada perdida enviada al gerente para aprobación",
    pendingMissed: "Entrada perdida pendiente de aprobación",
    invalidTimes: "La hora de salida debe ser después de la entrada",
  }
};

// ---------- STORAGE LAYER (Supabase) ----------
const SUPABASE_URL = "https://mylmnqkyniwzhqymtywh.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_iV5zIBx5VriA9XPaYfnY6w_BZQpsDu1";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

// camelCase <-> snake_case mappers (DB uses snake_case, JS uses camelCase)
function empFromDb(r) { return { id: r.id, name: r.name, pin: r.pin, rate: parseFloat(r.rate), otRate: parseFloat(r.ot_rate), language: r.language }; }
function empToDb(e) { return { id: e.id, name: e.name, pin: e.pin, rate: e.rate, ot_rate: e.otRate, language: e.language }; }
function punchFromDb(r) { return { id: r.id, empId: r.emp_id, clockIn: Number(r.clock_in), clockOut: r.clock_out == null ? null : Number(r.clock_out), startLoc: r.start_loc, endLoc: r.end_loc, fixApplied: r.fix_applied, addedManually: r.added_manually }; }
function punchToDb(p) { return { id: p.id, emp_id: p.empId, clock_in: p.clockIn, clock_out: p.clockOut, start_loc: p.startLoc, end_loc: p.endLoc, fix_applied: !!p.fixApplied, added_manually: !!p.addedManually }; }
function fixFromDb(r) { return { id: r.id, empId: r.emp_id, punchId: r.punch_id, originalClockOut: r.original_clock_out == null ? null : Number(r.original_clock_out), requestedClockOut: Number(r.requested_clock_out), note: r.note, status: r.status, submittedAt: Number(r.submitted_at) }; }
function fixToDb(f) { return { id: f.id, emp_id: f.empId, punch_id: f.punchId, original_clock_out: f.originalClockOut, requested_clock_out: f.requestedClockOut, note: f.note, status: f.status, submitted_at: f.submittedAt }; }
function missedFromDb(r) { return { id: r.id, empId: r.emp_id, clockIn: Number(r.clock_in), clockOut: Number(r.clock_out), note: r.note, status: r.status, submittedAt: Number(r.submitted_at) }; }
function missedToDb(m) { return { id: m.id, emp_id: m.empId, clock_in: m.clockIn, clock_out: m.clockOut, note: m.note, status: m.status, submitted_at: m.submittedAt }; }

const Store = {
  data: {
    employees: [],
    punches: [],
    fixRequests: [],
    missedRequests: [],
    managerPin: "9999",
  },
  ready: false,
  async load() {
    const [emps, pun, fix, miss, sett] = await Promise.all([
      sb.from('employees').select('*'),
      sb.from('punches').select('*'),
      sb.from('fix_requests').select('*'),
      sb.from('missed_requests').select('*'),
      sb.from('settings').select('*'),
    ]);
    if (emps.error) throw emps.error;
    if (pun.error)  throw pun.error;
    if (fix.error)  throw fix.error;
    if (miss.error) throw miss.error;
    if (sett.error) throw sett.error;
    this.data.employees      = (emps.data || []).map(empFromDb);
    this.data.punches        = (pun.data  || []).map(punchFromDb);
    this.data.fixRequests    = (fix.data  || []).map(fixFromDb);
    this.data.missedRequests = (miss.data || []).map(missedFromDb);
    const mgr = (sett.data || []).find(s => s.key === 'manager_pin');
    this.data.managerPin = mgr ? mgr.value : "9999";
    this.ready = true;
    this.subscribeRealtime();
  },
  // No-op: persistence now handled per-action via Store.api.* below
  save() {},
  // Realtime: any change in DB → refetch that table → re-render
  subscribeRealtime() {
    sb.channel('fhs_all')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'employees' },       () => this.refetchEmployees())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'punches' },         () => this.refetchPunches())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'fix_requests' },    () => this.refetchFixRequests())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'missed_requests' }, () => this.refetchMissed())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' },        () => this.refetchSettings())
      .subscribe();
  },
  async refetchEmployees() { const { data } = await sb.from('employees').select('*'); if (data) { this.data.employees = data.map(empFromDb); render(); } },
  async refetchPunches()   { const { data } = await sb.from('punches').select('*');   if (data) { this.data.punches   = data.map(punchFromDb); render(); } },
  async refetchFixRequests(){ const { data } = await sb.from('fix_requests').select('*'); if (data) { this.data.fixRequests = data.map(fixFromDb); render(); } },
  async refetchMissed()    { const { data } = await sb.from('missed_requests').select('*'); if (data) { this.data.missedRequests = data.map(missedFromDb); render(); } },
  async refetchSettings()  { const { data } = await sb.from('settings').select('*'); if (data) { const m = data.find(s => s.key === 'manager_pin'); if (m) this.data.managerPin = m.value; render(); } },

  // Granular write API — each mutation site calls one of these
  api: {
    async insertPunch(p)              { const { error } = await sb.from('punches').insert(punchToDb(p));                                   if (error) console.error('insertPunch', error); },
    async updatePunch(id, fields)     { const { error } = await sb.from('punches').update(punchToDb({ id, ...fields })).eq('id', id);      if (error) console.error('updatePunch', error); },
    async deletePunch(id)             { const { error } = await sb.from('punches').delete().eq('id', id);                                  if (error) console.error('deletePunch', error); },
    async insertFixRequest(f)         { const { error } = await sb.from('fix_requests').insert(fixToDb(f));                                if (error) console.error('insertFixRequest', error); },
    async updateFixRequest(id,fields) { const { error } = await sb.from('fix_requests').update(fixToDb({ id, ...fields })).eq('id', id);   if (error) console.error('updateFixRequest', error); },
    async insertMissed(m)             { const { error } = await sb.from('missed_requests').insert(missedToDb(m));                          if (error) console.error('insertMissed', error); },
    async updateMissed(id, fields)    { const { error } = await sb.from('missed_requests').update(missedToDb({ id, ...fields })).eq('id', id); if (error) console.error('updateMissed', error); },
    async insertEmployee(e)           { const { error } = await sb.from('employees').insert(empToDb(e));                                   if (error) console.error('insertEmployee', error); },
    async updateEmployee(id, fields)  { const { error } = await sb.from('employees').update(empToDb({ id, ...fields })).eq('id', id);      if (error) console.error('updateEmployee', error); },
    async deleteEmployee(id)          { const { error } = await sb.from('employees').delete().eq('id', id);                                if (error) console.error('deleteEmployee', error); },
    async upsertSetting(key, value)   { const { error } = await sb.from('settings').upsert({ key, value }, { onConflict: 'key' });         if (error) console.error('upsertSetting', error); },
  }
};

// ---------- HELPERS ----------
function fmtDur(ms) {
  if (ms < 0) ms = 0;
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s%60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
}
function fmtDateTime(ts) {
  return `${fmtDate(ts)} ${fmtTime(ts)}`;
}
function getPeriodStart(d = new Date()) {
  // Pay period starts Friday
  const day = d.getDay();
  const diff = (day + 2) % 7;
  const fri = new Date(d);
  fri.setDate(d.getDate() - diff);
  fri.setHours(0,0,0,0);
  return fri;
}
function getDayStart(d = new Date()) {
  const x = new Date(d);
  x.setHours(0,0,0,0);
  return x;
}
function getClosedPeriodStart(d = new Date()) {
  // Returns the Friday that starts the most recently CLOSED pay period.
  // On Friday morning, this returns LAST Friday (so Fri-Thu just ended).
  // On Thursday night, this returns the previous Friday.
  const day = d.getDay(); // 0=Sun, 5=Fri, 6=Sat
  // Find this week's Friday
  let diff = (day + 2) % 7;
  const thisFri = new Date(d);
  thisFri.setDate(d.getDate() - diff);
  thisFri.setHours(0,0,0,0);
  // Closed period started 7 days before this Friday
  const closedStart = new Date(thisFri);
  closedStart.setDate(thisFri.getDate() - 7);
  return closedStart;
}
function getDayKey(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}
async function getLocation() {
  return new Promise(res => {
    if (!navigator.geolocation) return res(null);
    navigator.geolocation.getCurrentPosition(
      p => res({ lat: p.coords.latitude.toFixed(5), lng: p.coords.longitude.toFixed(5) }),
      () => res(null),
      { timeout: 8000, enableHighAccuracy: false }
    );
  });
}

// ---------- STATE ----------
let state = {
  screen: 'pin', // pin, employee, manager
  currentEmpId: null,
  isManager: false,
  pinEntry: '',
  pinError: '',
  managerTab: 'overview',
  liveStart: null,
  liveTick: null,
  fixingPunch: null, // punch object being fixed
  addingMissed: false,
  payrollPeriodStart: null, // Date object - which payroll period to view
};

// ---------- COMPUTED ----------
function getEmployee(id) {
  return Store.data.employees.find(e => e.id === id);
}
function getOpenPunch(empId) {
  return Store.data.punches.find(p => p.empId === empId && !p.clockOut);
}
function getEmployeePunches(empId) {
  return Store.data.punches
    .filter(p => p.empId === empId)
    .sort((a,b) => b.clockIn - a.clockIn);
}
function getCompletedPunches(empId) {
  return Store.data.punches
    .filter(p => p.empId === empId && p.clockOut)
    .sort((a,b) => b.clockIn - a.clockIn);
}
function getTodayMs(empId) {
  const start = getDayStart().getTime();
  const end = start + 86400000;
  let total = 0;
  Store.data.punches
    .filter(p => p.empId === empId && p.clockOut && p.clockIn >= start && p.clockIn < end)
    .forEach(p => { total += (p.clockOut - p.clockIn); });
  // include live punch
  const open = getOpenPunch(empId);
  if (open && open.clockIn >= start) {
    total += (Date.now() - open.clockIn);
  }
  return total;
}
function getPeriodMs(empId) {
  const start = getPeriodStart().getTime();
  let total = 0;
  Store.data.punches
    .filter(p => p.empId === empId && p.clockOut && p.clockIn >= start)
    .forEach(p => { total += (p.clockOut - p.clockIn); });
  const open = getOpenPunch(empId);
  if (open && open.clockIn >= start) {
    total += (Date.now() - open.clockIn);
  }
  return total;
}
function msToHours(ms) {
  return ms / 3600000;
}

// ---------- PAYROLL CALCS ----------
function calcPayrollForPeriod(empId, periodStart, periodEnd) {
  const emp = getEmployee(empId);
  if (!emp) return null;
  let totalMs = 0;
  Store.data.punches
    .filter(p => p.empId === empId && p.clockOut && p.clockIn >= periodStart && p.clockIn < periodEnd)
    .forEach(p => { totalMs += (p.clockOut - p.clockIn); });
  const totalHrs = msToHours(totalMs);
  const regHrs = Math.min(totalHrs, 40);
  const otHrs = Math.max(0, totalHrs - 40);
  const regPay = regHrs * emp.rate;
  const otPay = otHrs * (emp.otRate || emp.rate * 1.5);
  return {
    emp,
    totalHrs,
    regHrs,
    otHrs,
    regPay,
    otPay,
    totalPay: regPay + otPay,
  };
}
function getPayPeriodEnd(start) {
  // Period is Friday 12am to Thursday 11:59pm = 7 days exactly
  return start.getTime() + (7 * 86400000);
}
function getPriorPeriodStart(start) {
  return new Date(start.getTime() - (7 * 86400000));
}

// ---------- ACTIONS ----------
async function clockIn(empId) {
  const loc = await getLocation();
  const p = { id: Date.now(), empId, clockIn: Date.now(), clockOut: null, startLoc: loc, endLoc: null };
  Store.data.punches.push(p);
  Store.api.insertPunch(p);
  render();
}
async function clockOut(empId) {
  const punch = getOpenPunch(empId);
  if (!punch) return;
  const loc = await getLocation();
  punch.clockOut = Date.now();
  punch.endLoc = loc;
  Store.api.updatePunch(punch.id, { empId: punch.empId, clockIn: punch.clockIn, clockOut: punch.clockOut, startLoc: punch.startLoc, endLoc: punch.endLoc, fixApplied: punch.fixApplied, addedManually: punch.addedManually });
  render();
}
function submitFix(punchId, requestedTime, note) {
  const punch = Store.data.punches.find(p => p.id === punchId);
  if (!punch) return;
  const f = { id: Date.now(), empId: punch.empId, punchId: punchId, originalClockOut: punch.clockOut, requestedClockOut: requestedTime, note: note || '', status: 'pending', submittedAt: Date.now() };
  Store.data.fixRequests.push(f);
  Store.api.insertFixRequest(f);
  state.fixingPunch = null;
  render();
}
function approveFix(reqId) {
  const req = Store.data.fixRequests.find(r => r.id === reqId);
  if (!req) return;
  const punch = Store.data.punches.find(p => p.id === req.punchId);
  if (punch) {
    punch.clockOut = req.requestedClockOut;
    punch.fixApplied = true;
    Store.api.updatePunch(punch.id, { empId: punch.empId, clockIn: punch.clockIn, clockOut: punch.clockOut, startLoc: punch.startLoc, endLoc: punch.endLoc, fixApplied: true, addedManually: punch.addedManually });
  }
  req.status = 'approved';
  Store.api.updateFixRequest(req.id, { empId: req.empId, punchId: req.punchId, originalClockOut: req.originalClockOut, requestedClockOut: req.requestedClockOut, note: req.note, status: 'approved', submittedAt: req.submittedAt });
  render();
}
function rejectFix(reqId) {
  const req = Store.data.fixRequests.find(r => r.id === reqId);
  if (!req) return;
  req.status = 'rejected';
  Store.api.updateFixRequest(req.id, { empId: req.empId, punchId: req.punchId, originalClockOut: req.originalClockOut, requestedClockOut: req.requestedClockOut, note: req.note, status: 'rejected', submittedAt: req.submittedAt });
  render();
}
function submitMissed(empId, clockInTs, clockOutTs, note) {
  const m = { id: Date.now(), empId, clockIn: clockInTs, clockOut: clockOutTs, note: note || '', status: 'pending', submittedAt: Date.now() };
  Store.data.missedRequests.push(m);
  Store.api.insertMissed(m);
  state.addingMissed = false;
  render();
}
function approveMissed(reqId) {
  const req = Store.data.missedRequests.find(r => r.id === reqId);
  if (!req) return;
  const p = { id: Date.now(), empId: req.empId, clockIn: req.clockIn, clockOut: req.clockOut, startLoc: null, endLoc: null, addedManually: true };
  Store.data.punches.push(p);
  Store.api.insertPunch(p);
  req.status = 'approved';
  Store.api.updateMissed(req.id, { empId: req.empId, clockIn: req.clockIn, clockOut: req.clockOut, note: req.note, status: 'approved', submittedAt: req.submittedAt });

}
function rejectMissed(reqId) {

  if (!req) return;
  req.status = 'rejected';
  Store.api.updateMissed(req.id, { empId: req.empId, clockIn: req.clockIn, clockOut: req.clockOut, note: req.note, status: 'rejected', submittedAt: req.submittedAt });

function editPunch(punchId, newIn, newOut) {
  const p = Store.data.punches.find(x => x.id === punchId);
  if (!p) return;
  p.clockIn = newIn;
  p.clockOut = newOut;

  render();
}

            <div class="stat-lbl">${t.periodPay}</div>

        ${todayPunches.length === 0
          ? `<div class="empty">${t.noPunches}</div>`
          : todayPunches.map(p => renderPunch(p, t, true)).join('')

      ${dayList.length > 0 ? `

          <div class="h2">${t.myHistory}</div>

window.submitMissedForm = function() {

  const inStr = document.getElementById('m-in').value;
  const outStr = document.getElementById('m-out').value;
  const note = document.getElementById('m-note').value;
  if (!dateStr || !inStr || !outStr) {
    alert('Please fill in date, clock-in, and clock-out');

  const [y, mo, da] = dateStr.split('-').map(Number);
  const [ih, im] = inStr.split(':').map(Number);
  const [oh, om] = outStr.split(':').map(Number);
  const inTs = new Date(y, mo-1, da, ih, im).getTime();

        const periodMs = getPeriodMs(e.id);
        return `
          <div style="margin-bottom:18px">
            <div class="day-header">
              <span>${e.name}</span>
              <span>${msToHours(periodMs).toFixed(2)} hrs this period</span>
            </div>
            ${list.slice(0, 10).map(p => `
              <div class="punch">
                <div class="punch-top">
                  <span class="punch-time">${fmtDate(p.clockIn)} ${fmtTime(p.clockIn)} → ${fmtTime(p.clockOut)}</span>
                  <span class="punch-dur">${msToHours(p.clockOut - p.clockIn).toFixed(2)} hrs</span>
                </div>
                <div class="punch-meta">
                  ${p.startLoc ? `<a class="loc" href="https://maps.google.com/?q=${p.startLoc.lat},${p.startLoc.lng}" target="_blank">📍 In</a>` : '<span style="font-size:11px;color:#aaa">No in-loc</span>'}
                  ${p.endLoc ? `<a class="loc" href="https://maps.google.com/?q=${p.endLoc.lat},${p.endLoc.lng}" target="_blank">📍 Out</a>` : '<span style="font-size:11px;color:#aaa">No out-loc</span>'}
                  ${p.fixApplied ? `<span class="flag">edited</span>` : ''}
                  ${p.addedManually ? `<span class="flag">added</span>` : ''}
                </div>
                <div class="row" style="margin-top:8px">
                  <button class="btn btn-gray btn-sm" onclick="editPunchPrompt(${p.id})">Edit</button>
                  <button class="btn btn-red btn-sm" onclick="deletePunchConfirm(${p.id})">Delete</button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }).join('')}
      ${punches.length === 0 ? '<div class="empty">No completed punches yet</div>' : ''}
    </div>
  `;
}

function renderManagerPayroll() {
  // Default to most recently CLOSED period
  if (!state.payrollPeriodStart) {
    state.payrollPeriodStart = getClosedPeriodStart();
  }
  const periodStart = state.payrollPeriodStart;
  const periodEnd = getPayPeriodEnd(periodStart);
  const periodEndDate = new Date(periodEnd - 1); // for display: Thursday 11:59pm
  const isCurrent = (periodStart.getTime() === getClosedPeriodStart().getTime());

  const rows = Store.data.employees.map(e => calcPayrollForPeriod(e.id, periodStart.getTime(), periodEnd))
    .filter(r => r && r.totalHrs > 0);

  let grandHrs = 0, grandReg = 0, grandOt = 0, grandPay = 0;
  rows.forEach(r => {
    grandHrs += r.totalHrs;
    grandReg += r.regPay;
    grandOt += r.otPay;
    grandPay += r.totalPay;
  });

  return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
          <div class="h1">Payroll</div>
          <div class="sub">${fmtDate(periodStart)} - ${fmtDate(periodEndDate)}</div>
        </div>
      </div>

      <div class="row" style="margin-bottom:14px;gap:6px">
        <button class="btn btn-gray btn-sm" onclick="prevPeriod()">← Previous</button>
        ${!isCurrent ? `<button class="btn btn-gray btn-sm" onclick="nextPeriod()">Next →</button>` : ''}
        ${!isCurrent ? `<button class="btn btn-blue btn-sm" onclick="thisPeriod()">Most recent</button>` : ''}
      </div>

      ${isCurrent ? `<div class="banner banner-info">This is the most recent closed pay period. Anything clocked in today (Friday) or after counts toward next week.</div>` : ''}

      <div class="stat-row">
        <div class="stat">
          <div class="stat-val">${grandHrs.toFixed(2)}</div>
          <div class="stat-lbl">Total hours</div>
        </div>
        <div class="stat">
          <div class="stat-val">$${grandPay.toFixed(2)}</div>
          <div class="stat-lbl">Total payroll</div>
        </div>
      </div>

      ${rows.length === 0 ? '<div class="empty">No hours worked this period</div>' : rows.map(r => `
        <div style="padding:14px 0;border-bottom:1px solid #f0f0f0">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <div style="font-weight:700;font-size:16px">${r.emp.name}</div>
            <div style="font-weight:800;font-size:18px;color:#16a34a">$${r.totalPay.toFixed(2)}</div>
          </div>
          <div style="font-size:13px;color:#666;line-height:1.7">
            <div>Regular: ${r.regHrs.toFixed(2)} hrs × $${r.emp.rate.toFixed(2)} = <strong>$${r.regPay.toFixed(2)}</strong></div>
            ${r.otHrs > 0 ? `<div style="color:#ea580c">Overtime: ${r.otHrs.toFixed(2)} hrs × $${(r.emp.otRate || r.emp.rate * 1.5).toFixed(2)} = <strong>$${r.otPay.toFixed(2)}</strong></div>` : ''}
          </div>
        </div>
      `).join('')}

      <div style="display:flex;justify-content:space-between;padding:14px 0 4px;border-top:2px solid #1e3a5f;margin-top:8px">
        <div style="font-weight:800;font-size:16px">TOTAL</div>
        <div style="font-weight:800;font-size:20px;color:#1e3a5f">$${grandPay.toFixed(2)}</div>
      </div>

      <button class="btn btn-blue" style="margin-top:14px" onclick="downloadPayrollCSV()">📥 Download CSV</button>
    </div>
  `;
}

function renderManagerRequests() {
  const fixReqs = [...Store.data.fixRequests].map(r => ({...r, type: 'fix'}));
  const missedReqs = [...Store.data.missedRequests].map(r => ({...r, type: 'missed'}));
  const allReqs = [...fixReqs, ...missedReqs].sort((a,b) => b.submittedAt - a.submittedAt);

  return `
    <div class="card">
      <div class="h2">Pending requests</div>
      ${allReqs.length === 0 ? '<div class="empty">No requests yet</div>' : allReqs.map(r => {
        const emp = getEmployee(r.empId);
        const statusClass = r.status === 'pending' ? 'status-pending' :
                            r.status === 'approved' ? 'status-approved' : 'status-rejected';
        const statusLabel = r.status === 'pending' ? '⏳ Pending' :
                            r.status === 'approved' ? '✅ Approved' : '❌ Rejected';
        if (r.type === 'fix') {
          return `
            <div class="req-card">
              <div class="row" style="justify-content:space-between;margin-bottom:8px">
                <div>
                  <div style="font-weight:700">${emp ? emp.name : 'Unknown'}</div>
                  <div style="font-size:11px;color:#888;font-weight:600">PUNCH FIX</div>
                </div>
                <div class="${statusClass}">${statusLabel}</div>
              </div>
              <div style="font-size:13px;line-height:1.6">
                <div>Original out: <strong>${fmtDateTime(r.originalClockOut)}</strong></div>
                <div>Requested out: <strong style="color:#2563eb">${fmtDateTime(r.requestedClockOut)}</strong></div>
                ${r.note ? `<div style="font-style:italic;color:#666;margin-top:4px">"${r.note}"</div>` : ''}
                <div style="font-size:12px;color:#888;margin-top:6px">Submitted ${fmtDateTime(r.submittedAt)}</div>
              </div>
              ${r.status === 'pending' ? `
                <div class="row" style="margin-top:10px">
                  <button class="btn btn-green btn-sm" style="flex:1" onclick="approveFix(${r.id})">Approve</button>
                  <button class="btn btn-red btn-sm" style="flex:1" onclick="rejectFix(${r.id})">Reject</button>
                </div>
              ` : ''}
            </div>
          `;
        } else {
          // missed punch
          const dur = msToHours(r.clockOut - r.clockIn).toFixed(2);
          return `
            <div class="req-card" style="border-color:#fed7aa;background:#fff7ed">
              <div class="row" style="justify-content:space-between;margin-bottom:8px">
                <div>
                  <div style="font-weight:700">${emp ? emp.name : 'Unknown'}</div>
                  <div style="font-size:11px;color:#888;font-weight:600">MISSED PUNCH</div>
                </div>
                <div class="${statusClass}">${statusLabel}</div>
              </div>
              <div style="font-size:13px;line-height:1.6">
                <div><strong>${fmtDate(r.clockIn)}</strong></div>
                <div>Clock in: <strong>${fmtTime(r.clockIn)}</strong></div>
                <div>Clock out: <strong>${fmtTime(r.clockOut)}</strong></div>
                <div>Total: <strong style="color:#2563eb">${dur} hrs</strong></div>
                ${r.note ? `<div style="font-style:italic;color:#666;margin-top:4px">"${r.note}"</div>` : ''}
                <div style="font-size:12px;color:#888;margin-top:6px">Submitted ${fmtDateTime(r.submittedAt)}</div>
              </div>
              ${r.status === 'pending' ? `
                <div class="row" style="margin-top:10px">
                  <button class="btn btn-green btn-sm" style="flex:1" onclick="approveMissed(${r.id})">Approve</button>
                  <button class="btn btn-red btn-sm" style="flex:1" onclick="rejectMissed(${r.id})">Reject</button>
                </div>
              ` : ''}
            </div>
          `;
        }
      }).join('')}
    </div>
  `;
}

function renderManagerEmployees() {
  return `
    <div class="card">
      <div class="h2">Add employee</div>
      <input class="inp" id="new-name" placeholder="Full name" style="margin-bottom:8px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <input class="inp" id="new-rate" type="number" step="0.01" placeholder="Regular $/hr" inputmode="decimal">
        <input class="inp" id="new-ot-rate" type="number" step="0.01" placeholder="OT $/hr" inputmode="decimal">
        <input class="inp" id="new-pin" type="number" placeholder="4-digit PIN" inputmode="numeric" maxlength="4">
        <select class="inp" id="new-lang">
          <option value="en">English</option>
          <option value="es">Spanish</option>
        </select>
      </div>
      <div style="font-size:12px;color:#666;margin-bottom:8px">Leave OT rate blank to default to 1.5× regular rate</div>
      <button class="btn btn-blue" onclick="addEmp()">Add employee</button>
    </div>

    <div class="card">
      <div class="h2">Team members</div>
      ${Store.data.employees.map(e => `
        <div class="emp-list-item">
          <div class="row" style="justify-content:space-between;margin-bottom:4px">
            <div style="font-weight:700">${e.name}</div>
            <div>
              <span style="background:${e.language==='es'?'#fce7f3':'#e0edff'};color:${e.language==='es'?'#9d174d':'#1e3a5f'};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">
                ${e.language === 'es' ? 'Español' : 'English'}
              </span>
            </div>
          </div>
          <div style="font-size:13px;color:#666">
            Reg: $${e.rate.toFixed(2)}/hr · OT: $${(e.otRate || e.rate * 1.5).toFixed(2)}/hr · PIN: ****
          </div>
          <div class="row" style="margin-top:8px">
            <button class="btn btn-gray btn-sm" onclick="editEmp(${e.id})">Edit</button>
            <button class="btn btn-red btn-sm" onclick="removeEmp(${e.id})">Remove</button>
            <button class="btn btn-gray btn-sm" onclick="toggleLang(${e.id})">
              Switch to ${e.language === 'es' ? 'EN' : 'ES'}
            </button>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="card">
      <div class="h2">Manager PIN</div>
      <div style="font-size:13px;color:#666;margin-bottom:8px">Currently: <strong>${Store.data.managerPin}</strong></div>
      <div class="row">
        <input class="inp" id="new-mgr-pin" type="number" placeholder="New manager PIN" inputmode="numeric" maxlength="4" style="flex:1">
        <button class="btn btn-blue btn-sm" onclick="updateMgrPin()">Update</button>
      </div>
    </div>
  `;
}

window.setTab = function(name) {
  state.managerTab = name;
  render();
};
window.addEmp = function() {
  const name = document.getElementById('new-name').value.trim();
  const rate = parseFloat(document.getElementById('new-rate').value);
  const otRateRaw = document.getElementById('new-ot-rate').value.trim();
  const otRate = otRateRaw ? parseFloat(otRateRaw) : rate * 1.5;
  const pin = document.getElementById('new-pin').value.trim();
  const lang = document.getElementById('new-lang').value;
  if (!name || !rate || pin.length !== 4) {
    alert('Fill in name, rate, and a 4-digit PIN');
    return;
  }
  if (Store.data.employees.some(e => e.pin === pin) || pin === Store.data.managerPin) {
    alert('That PIN is already in use');
    return;
  }
  const emp = { id: Date.now(), name, pin, rate, otRate, language: lang };
  Store.data.employees.push(emp);
  Store.api.insertEmployee(emp);
  render();
};
window.editEmp = function(id) {
  const e = getEmployee(id);
  if (!e) return;
  const name = prompt('Name:', e.name);
  if (name === null) return;
  const rate = prompt('Regular hourly rate:', e.rate);
  if (rate === null) return;
  const otRate = prompt('Overtime hourly rate (over 40 hrs/wk):', e.otRate || (parseFloat(rate) * 1.5));
  if (otRate === null) return;
  const pin = prompt('PIN (leave blank to keep current):', '');
  if (pin && pin.length === 4) {
    if (Store.data.employees.some(x => x.pin === pin && x.id !== id) || pin === Store.data.managerPin) {
      alert('That PIN is already in use');
      return;
    }
    e.pin = pin;
  }
  e.name = name;
  e.rate = parseFloat(rate);
  e.otRate = parseFloat(otRate);
  Store.api.updateEmployee(e.id, { name: e.name, pin: e.pin, rate: e.rate, otRate: e.otRate, language: e.language });
  render();
};
window.removeEmp = function(id) {
  const e = getEmployee(id);
  if (!e) return;
  if (!confirm(`Remove ${e.name}? Their punch history will be kept but they won't be able to clock in.`)) return;
  Store.data.employees = Store.data.employees.filter(x => x.id !== id);
  Store.api.deleteEmployee(id);
  render();
};
window.toggleLang = function(id) {
  const e = getEmployee(id);
  if (!e) return;
  e.language = e.language === 'es' ? 'en' : 'es';
  Store.api.updateEmployee(e.id, { name: e.name, pin: e.pin, rate: e.rate, otRate: e.otRate, language: e.language });
  render();
};
window.updateMgrPin = function() {
  const v = document.getElementById('new-mgr-pin').value.trim();
  if (v.length !== 4) { alert('PIN must be 4 digits'); return; }
  if (Store.data.employees.some(e => e.pin === v)) { alert('That PIN is already in use'); return; }
  Store.data.managerPin = v;
  Store.api.upsertSetting('manager_pin', v);
  alert('Manager PIN updated');
  render();
};
window.approveFix = approveFix;
window.rejectFix = rejectFix;
window.approveMissed = approveMissed;
window.rejectMissed = rejectMissed;
window.editPunchPrompt = function(punchId) {
  const p = Store.data.punches.find(x => x.id === punchId);
  if (!p) return;
  const inDate = new Date(p.clockIn);
  const outDate = new Date(p.clockOut);
  const inDef = `${inDate.toLocaleDateString()} ${inDate.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  const outDef = `${outDate.toLocaleDateString()} ${outDate.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  const newIn = prompt(`Edit clock-in (format: M/D/YYYY HH:MM AM/PM):`, inDef);
  if (newIn === null) return;
  const newOut = prompt(`Edit clock-out (format: M/D/YYYY HH:MM AM/PM):`, outDef);
  if (newOut === null) return;
  const inTs = Date.parse(newIn);
  const outTs = Date.parse(newOut);
  if (isNaN(inTs) || isNaN(outTs)) { alert('Could not parse those dates/times'); return; }
  if (outTs <= inTs) { alert('Clock-out must be after clock-in'); return; }
  editPunch(punchId, inTs, outTs);
};
window.deletePunchConfirm = function(punchId) {
  if (!confirm('Delete this punch? This cannot be undone.')) return;
  deletePunch(punchId);
};
window.prevPeriod = function() {
  state.payrollPeriodStart = getPriorPeriodStart(state.payrollPeriodStart);
  render();
};
window.nextPeriod = function() {
  const next = new Date(state.payrollPeriodStart.getTime() + (7 * 86400000));
  const closedStart = getClosedPeriodStart();
  if (next.getTime() > closedStart.getTime()) {
    state.payrollPeriodStart = closedStart;
  } else {
    state.payrollPeriodStart = next;
  }
  render();
};
window.thisPeriod = function() {
  state.payrollPeriodStart = getClosedPeriodStart();
  render();
};
window.downloadPayrollCSV = function() {
  const periodStart = state.payrollPeriodStart;
  const periodEnd = getPayPeriodEnd(periodStart);
  const periodEndDate = new Date(periodEnd - 1);
  const rows = Store.data.employees.map(e => calcPayrollForPeriod(e.id, periodStart.getTime(), periodEnd))
    .filter(r => r && r.totalHrs > 0);

  let csv = `FHS Team Tracker Payroll\n`;
  csv += `Pay period:,${fmtDate(periodStart)} - ${fmtDate(periodEndDate)}\n`;
  csv += `Generated:,${new Date().toLocaleString()}\n\n`;
  csv += `Employee,Regular Hours,Regular Rate,Regular Pay,OT Hours,OT Rate,OT Pay,Total Hours,Total Pay\n`;

  let gReg = 0, gOt = 0, gHrs = 0, gPay = 0;
  rows.forEach(r => {
    csv += `"${r.emp.name}",${r.regHrs.toFixed(2)},${r.emp.rate.toFixed(2)},${r.regPay.toFixed(2)},${r.otHrs.toFixed(2)},${(r.emp.otRate || r.emp.rate * 1.5).toFixed(2)},${r.otPay.toFixed(2)},${r.totalHrs.toFixed(2)},${r.totalPay.toFixed(2)}\n`;
    gReg += r.regPay;
    gOt += r.otPay;
    gHrs += r.totalHrs;
    gPay += r.totalPay;
  });
  csv += `\nTOTALS,,,${gReg.toFixed(2)},,,${gOt.toFixed(2)},${gHrs.toFixed(2)},${gPay.toFixed(2)}\n`;

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  const periodLabel = `${periodStart.getFullYear()}-${String(periodStart.getMonth()+1).padStart(2,'0')}-${String(periodStart.getDate()).padStart(2,'0')}`;
  link.download = `FHS_Payroll_${periodLabel}.csv`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
};

// ---------- MAIN RENDER ----------
function render() {
  const root = document.getElementById('app');
  if (state.screen === 'pin') {
    root.innerHTML = renderPin();
  } else if (state.screen === 'employee') {
    root.innerHTML = renderEmployee();
  } else if (state.screen === 'manager') {
    root.innerHTML = renderManager();
  }
}

// ---------- INIT ----------
(async () => {
  try {
    document.getElementById('app').innerHTML = '<div class="topbar"><h1>FHS Team Tracker</h1></div><div class="wrap"><div class="card"><div class="h2">Loading...</div></div></div>';
    await Store.load();
    render();
  } catch (err) {
    console.error('Failed to load:', err);
    document.getElementById('app').innerHTML = '<div class="topbar"><h1>FHS Team Tracker</h1></div><div class="wrap"><div class="card"><div class="h2">Connection error</div><div class="sub">' + (err.message || err) + '</div><button class="btn btn-blue" onclick="location.reload()">Retry</button></div></div>';
  }
})();
// Manager view also needs ticking for live "on the clock" status
setInterval(() => {
  if (state.screen === 'manager' && Store.data.punches.some(p => !p.clockOut)) {
    render();
  }
}, 5000);

// PWA: register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
